<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Регистрация — DoIt</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="auth-page">
    <div class="auth-card">

      <div class="auth-logo">
        <a href="index.html" class="logo">
          <span class="logo-dot"></span> DoIt
        </a>
      </div>

      <h1 class="auth-title">Создать аккаунт</h1>
      <p class="auth-subtitle">Начните управлять своими задачами уже сегодня</p>

      <form action="/register/" method="POST" id="reg-form">
        {% csrf_token %}

        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="first_name">Имя</label>
            <input
              type="text"
              id="first_name"
              name="first_name"
              class="form-input"
              placeholder="Алина"
              required
            />
          </div>
          <div class="form-group">
            <label class="form-label" for="last_name">Фамилия</label>
            <input
              type="text"
              id="last_name"
              name="last_name"
              class="form-input"
              placeholder="Иванова"
            />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="username">Имя пользователя</label>
          <input
            type="text"
            id="username"
            name="username"
            class="form-input"
            placeholder="alina_ivanova"
            autocomplete="username"
            required
          />
          <div class="form-hint">Только буквы, цифры и символы _ @</div>
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            class="form-input"
            placeholder="alina@example.com"
            autocomplete="email"
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="password1">Пароль</label>
          <input
            type="password"
            id="password1"
            name="password1"
            class="form-input"
            placeholder="Минимум 8 символов"
            autocomplete="new-password"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="password2">Повторите пароль</label>
          <input
            type="password"
            id="password2"
            name="password2"
            class="form-input"
            placeholder="••••••••"
            autocomplete="new-password"
            required
          />
          <div class="form-error" id="pass-error" style="display:none;">Пароли не совпадают</div>
        </div>

        <button type="submit" class="btn btn--primary btn--full" style="margin-top: 8px;">
          Создать аккаунт
        </button>
      </form>

      <div class="auth-footer" style="margin-top: 20px;">
        Уже есть аккаунт?
        <a href="login.html">Войти</a>
      </div>

    </div>
  </div>

  <script>
    document.getElementById('reg-form').addEventListener('submit', function(e) {
      const p1 = document.getElementById('password1').value;
      const p2 = document.getElementById('password2').value;
      const err = document.getElementById('pass-error');
      if (p1 !== p2) {
        e.preventDefault();
        err.style.display = 'block';
        document.getElementById('password2').style.borderColor = 'var(--danger)';
      } else {
        err.style.display = 'none';
      }
    });
  </script>

</body>
</html>
