<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Новая задача — DoIt</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="page">

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="container">
      <div class="navbar__inner">
        <a href="index.html" class="logo">
          <span class="logo-dot"></span> DoIt
        </a>
        <div class="nav-user">
          <span>Привет, Алина</span>
          <div class="nav-avatar">А</div>
          <a href="login.html">Выйти</a>
        </div>
      </div>
    </div>
  </nav>

  <div class="container task-form-page">

    <!-- PAGE HEADER -->
    <div class="page-header">
      <a href="index.html" class="page-header__back">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </a>
      <div>
        <h1 class="page-header__title">Новая задача</h1>
        <p class="page-header__sub">Заполните информацию о задаче</p>
      </div>
    </div>

    <form action="/tasks/create/" method="POST">
      {% csrf_token %}

      <div class="form-card">

        <!-- ОСНОВНОЕ -->
        <div class="form-section-title">Основное</div>

        <div class="form-group">
          <label class="form-label" for="title">Название задачи *</label>
          <input
            type="text"
            id="title"
            name="title"
            class="form-input"
            placeholder="Например: Написать views.py для задач"
            required
            maxlength="200"
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="description">Описание</label>
          <textarea
            id="description"
            name="description"
            class="form-textarea"
            placeholder="Подробности, шаги выполнения, ссылки..."
            rows="4"
          ></textarea>
        </div>

        <!-- ПАРАМЕТРЫ -->
        <div class="form-section-title" style="margin-top: 28px;">Параметры</div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="category">Категория</label>
            <select id="category" name="category" class="form-select">
              <option value="">— Без категории —</option>
              <option value="work">💼 Работа</option>
              <option value="personal">🏠 Личное</option>
              <option value="health">💪 Здоровье</option>
              <option value="other">📌 Другое</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label" for="priority">Приоритет</label>
            <select id="priority" name="priority" class="form-select">
              <option value="low">🟢 Низкий</option>
              <option value="medium" selected>🟡 Средний</option>
              <option value="high">🔴 Высокий</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="due_date">Срок выполнения</label>
            <input
              type="date"
              id="due_date"
              name="due_date"
              class="form-input"
            />
          </div>

          <div class="form-group">
            <label class="form-label" for="due_time">Время</label>
            <input
              type="time"
              id="due_time"
              name="due_time"
              class="form-input"
            />
          </div>
        </div>

        <!-- СОСТОЯНИЕ -->
        <div class="form-section-title" style="margin-top: 28px;">Состояние</div>

        <div class="form-group">
          <label style="display: flex; align-items: center; gap: 12px; cursor: pointer;">
            <div class="task-check" id="done-check" onclick="toggleDone(this)" style="margin-top: 0;"></div>
            <div>
              <div style="font-size: 15px; font-weight: 500; color: var(--text);">Отметить как выполненную</div>
              <div style="font-size: 13px; color: var(--text2);">Задача уже завершена</div>
            </div>
          </label>
          <input type="hidden" name="is_done" id="is_done_input" value="false" />
        </div>

        <!-- ACTIONS -->
        <div class="form-actions">
          <a href="index.html" class="btn btn--ghost">Отмена</a>
          <button type="submit" class="btn btn--primary">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
            Создать задачу
          </button>
        </div>

      </div>
    </form>
  </div>

  <script>
    // Set today as min date
    const dateInput = document.getElementById('due_date');
    const today = new Date().toISOString().split('T')[0];
    dateInput.min = today;

    function toggleDone(el) {
      el.classList.toggle('checked');
      document.getElementById('is_done_input').value = el.classList.contains('checked');
    }
  </script>

</body>
</html>
