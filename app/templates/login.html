<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Вход — DoIt</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="auth-page">
    <div class="auth-card">

      <div class="auth-logo">
        <a href="index.html" class="logo">
          <span class="logo-dot"></span> DoIt
        </a>
      </div>

      <h1 class="auth-title">Добро пожаловать</h1>
      <p class="auth-subtitle">Войдите, чтобы продолжить работу с задачами</p>

      <!-- Flash message example (скрыт по умолчанию) -->
      <!-- <div class="flash flash--error">Неверный логин или пароль</div> -->

      <form action="/login/" method="POST">
        {% csrf_token %}

        <div class="form-group">
          <label class="form-label" for="username">Имя пользователя</label>
          <input
            type="text"
            id="username"
            name="username"
            class="form-input"
            placeholder="your_username"
            autocomplete="username"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Пароль</label>
          <input
            type="password"
            id="password"
            name="password"
            class="form-input"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
          <div class="form-hint" style="text-align: right; margin-top: 8px;">
            <a href="#" style="color: var(--accent); font-size: 13px; text-decoration: none;">Забыли пароль?</a>
          </div>
        </div>

        <button type="submit" class="btn btn--primary btn--full" style="margin-top: 4px;">
          Войти
        </button>
      </form>

      <div class="auth-divider">или</div>

      <div class="auth-footer">
        Нет аккаунта?
        <a href="register.html">Зарегистрироваться</a>
      </div>

    </div>
  </div>

</body>
</html>
